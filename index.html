<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trilobite Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #030308;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script>
    let t = 0, g, s, ox, oy;
    
    // Beautiful neon palette
    const palette = [
      [255,107,157],  // hot pink
      [255,87,98],    // coral
      [255,183,55],   // amber
      [72,220,111],  // mint
      [60,180,255],  // sky blue
      [0,245,240],   // cyan
      [160,94,234],  // violet
      [255,130,180]  // rose
    ];
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      pixelDensity(1);
      s = min(width, height) / 400;
      ox = (width - 400 * s) / 2;
      oy = (height - 400 * s) / 2;
      g = createGraphics(~~(400 * s), ~~(400 * s));
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      s = min(width, height) / 400;
      ox = (width - 400 * s) / 2;
      oy = (height - 400 * s) / 2;
      g = createGraphics(~~(400 * s), ~~(400 * s));
    }
    
    function draw() {
      // Soft fade for trails
      g.noStroke();
      g.fill(3,3,8, 25);
      g.rect(0, 0, g.width, g.height);
      
      g.loadPixels();
      t += PI / 90;
      
      for (let i = 42000; i--; ) {
        const x = i % 210;
        const y = ~~(i / 210);
        const k = x/8 - 13;
        const e = y/8 - 13;
        const o = 2 - mag(k, e)/3;
        const d = -5 * abs(sin(k/2) * cos(e * 0.6));
        
        const px = ~~(((x + e * cos(t) + d * k * sin(d + t)) * 0.72 + k * o + 130) * s);
        const py = ~~(((y - d * o * 9 + y * e / 19 + d * e * cos(d + t)) * 0.72 + e * o + 150) * s);
        
        // Color based on flow field
        const colIdx = floor((abs(d) * 3 + x/20 + t * 2) % palette.length);
        const [r, gr, b] = palette[colIdx];
        
        // Glow effect
        const glow = 0.7 + 0.3 * sin(t + x/30);
        
        if (px >= 0 && px < g.width && py >= 0 && py < g.height) {
          const idx = (py * g.width + px) * 4;
          g.pixels[idx] = min(255, r * glow + g.pixels[idx] * 0.3);
          g.pixels[idx+1] = min(255, gr * glow + g.pixels[idx+1] * 0.3);
          g.pixels[idx+2] = min(255, b * glow + g.pixels[idx+2] * 0.3);
          g.pixels[idx+3] = 255;
        }
      }
      
      g.updatePixels();
      image(g, ox, oy);
    }
  </script>
</body>
</html>
