<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐉 Dragon Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script>
    let t = 0;
    
    // Chinese dragon body points (long serpent)
    const dragon = [];
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      
      // Build long dragon body curve
      for (let i = 0; i < 60; i++) {
        const progress = i / 60;
        // S-curve path across screen
        let x = 0.08 + progress * 0.85;
        let y = 0.5 + Math.sin(progress * Math.PI * 3) * 0.25;
        
        // Add some variation
        y += Math.sin(progress * Math.PI * 7) * 0.05;
        
        dragon.push([x, y]);
      }
    }
    
    function draw() {
      // Dark fade with trails
      background(5, 5, 16);
      noStroke();
      fill(5, 5, 16, 30);
      rect(0, 0, width, height);
      
      t += 0.02;
      
      // Draw dragon glow backbone
      for (let i = 0; i < dragon.length; i++) {
        const [bx, by] = dragon[i];
        const x = bx * width;
        const y = by * height;
        
        // Animated wiggle
        const wiggle = Math.sin(t * 2 + i * 0.3) * 8;
        const wx = x + wiggle;
        const wy = y + Math.cos(t * 1.5 + i * 0.2) * 10;
        
        // Body segments with gradient colors
        const progress = i / dragon.length;
        
        // Head colors (jade to gold to red)
        let r, g, b;
        if (progress < 0.3) {
          r = 0; g = 200 + progress * 180; b = 150 + progress * 100;
        } else if (progress < 0.7) {
          r = (progress - 0.3) * 600; g = 255; b = 100 - (progress - 0.3) * 150;
        } else {
          r = 200 + (progress - 0.7) * 180; g = 100 - (progress - 0.7) * 300; b = 0;
        }
        
        // Body glow
        const size = 12 + Math.sin(t + i * 0.2) * 4;
        const alpha = 180 + 75 * Math.sin(t * 2 + i * 0.1);
        
        fill(r, g, b, alpha);
        ellipse(wx, wy, size, size);
        
        // Inner bright core
        fill(255, 255, 200, alpha * 0.8);
        ellipse(wx, wy, size * 0.4, size * 0.4);
      }
      
      // Dragon head
      const head = dragon[Math.floor(dragon.length * 0.85)];
      const hx = head[0] * width + Math.sin(t * 2) * 8;
      const hy = head[1] * height;
      
      // Head glow
      fill(255, 200, 50, 200);
      ellipse(hx, hy, 35, 35);
      fill(255, 255, 220, 250);
      ellipse(hx, hy, 20, 20);
      
      // Eyes
      fill(255, 255, 0);
      ellipse(hx - 5, hy - 3, 4, 4);
      ellipse(hx + 5, hy - 3, 4, 4);
      
      // Whiskers
      for (let w = 0; w < 3; w++) {
        const wy1 = hy + 5 + w * 5;
        const wx1 = hx + 20 + w * 10 + Math.sin(t * 3 + w) * 5;
        stroke(255, 200, 50, 150);
        strokeWeight(1);
        line(hx + 10, wy1, wx1, wy1 + 10);
      }
      
      // Floating particles/scale dust
      for (let p = 0; p < 30; p++) {
        const px = (Math.sin(t * 0.5 + p * 1.7) * 0.5 + 0.5) * width;
        const py = (Math.cos(t * 0.3 + p * 2.3) * 0.3 + 0.5) * height;
        const ps = 2 + Math.sin(t + p) * 1;
        
        fill(100, 255, 200, 100);
        noStroke();
        ellipse(px, py, ps, ps);
      }
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
