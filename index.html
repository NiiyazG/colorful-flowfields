<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorful Flow Field</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050508;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script>
    let t = 0, g, s, ox, oy;
    
    // Rich colorful palette
    const colors = [
      [255,107,157], // pink
      [196,69,105], // dark pink
      [255,217,61],  // yellow
      [107,203,119], // green
      [77,150,255], // blue
      [0,255,245],  // cyan
      [160,94,234], // purple
      [255,159,67]  // orange
    ];
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      pixelDensity(1);
      s = min(width, height) / 400;
      ox = (width - 400 * s) / 2;
      oy = (height - 400 * s) / 2;
      g = createGraphics(~~(400 * s), ~~(400 * s));
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      s = min(width, height) / 400;
      ox = (width - 400 * s) / 2;
      oy = (height - 400 * s) / 2;
      g = createGraphics(~~(400 * s), ~~(400 * s));
    }
    
    function draw() {
      background(5,5,8);
      g.background(5,5,8, 30); // semi-transparent for trails
      g.loadPixels();
      t += PI / 90;
      
      for (let i = 40000; i--; ) {
        const x = i % 200;
        const y = ~~(i / 200);
        const k = x/8 - 12.5;
        const e = y/8 - 12;
        const o = 2 - mag(k, e)/3;
        const d = -5 * abs(sin(k/2) * cos(e * 0.6));
        
        const px = ~~(((x + e * cos(t) + d * k * sin(d + t)) * 0.7 + k * o + 130) * s);
        const py = ~~(((y - d * o * 9 + y * e / 19 + d * e * cos(d + t)) * 0.7 + e * o + 150) * s);
        
        // Color based on position and time
        const colIdx = floor((x + y + t * 30) / 50) % colors.length;
        const [r, gr, b] = colors[colIdx];
        
        if (px >= 0 && px < g.width && py >= 0 && py < g.height) {
          const idx = (py * g.width + px) * 4;
          // Blend with existing color for glow effect
          g.pixels[idx] = min(255, r + g.pixels[idx] * 0.5);
          g.pixels[idx+1] = min(255, gr + g.pixels[idx+1] * 0.5);
          g.pixels[idx+2] = min(255, b + g.pixels[idx+2] * 0.5);
          g.pixels[idx+3] = 255;
        }
      }
      
      g.updatePixels();
      image(g, ox, oy);
    }
  </script>
</body>
</html>
