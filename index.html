<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐉 Dragon Outline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #1a0a2e, #2d1b4e);
      min-height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script>
    let particles = [];
    let t = 0;
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      
      // Dragon outline points (staying close to shape)
      const cx = width / 2;
      const cy = height / 2;
      
      // Head outline
      for (let i = 0; i < 25; i++) {
        const angle = (i / 25) * TWO_PI;
        particles.push({
          baseX: cx + 55 + cos(angle) * 35,
          baseY: cy - 35 + sin(angle) * 30,
          x: 0, y: 0,
          col: [100, 220, 180],
          size: 6,
          phase: i
        });
      }
      
      // Snout
      for (let i = 0; i < 8; i++) {
        particles.push({
          baseX: cx + 85 + i * 3,
          baseY: cy - 20 + sin(i) * 2,
          x: 0, y: 0,
          col: [120, 230, 190],
          size: 5,
          phase: i
        });
      }
      
      // Eyes
      particles.push({baseX: cx - 15, baseY: cy - 35, x: 0, y: 0, col: [255], size: 8, phase: 0});
      particles.push({baseX: cx + 15, baseY: cy - 35, x: 0, y: 0, col: [255], size: 8, phase: 0});
      particles.push({baseX: cx - 15, baseY: cy - 35, x: 0, y: 0, col: [30], size: 4, phase: 1});
      particles.push({baseX: cx + 15, baseY: cy - 35, x: 0, y: 0, col: [30], size: 4, phase: 1});
      
      // Body
      for (let i = 0; i < 20; i++) {
        const px = i < 10 ? -50 + i * 10 : -50 + i * 10;
        const py = sin(i * 0.5) * 15;
        particles.push({
          baseX: cx + px,
          baseY: cy + 20 + py,
          x: 0, y: 0,
          col: [100, 220, 180],
          size: 7,
          phase: i
        });
        // belly
        particles.push({
          baseX: cx + px,
          baseY: cy + 30 + py,
          x: 0, y: 0,
          col: [180, 255, 220],
          size: 5,
          phase: i + 10
        });
      }
      
      // Wings
      for (let i = 0; i < 8; i++) {
        particles.push({
          baseX: cx - 55 - i * 5,
          baseY: cy - 10 + i * 2,
          x: 0, y: 0,
          col: [150, 200, 255],
          size: 5,
          phase: i
        });
        particles.push({
          baseX: cx + 55 + i * 5,
          baseY: cy - 10 + i * 2,
          x: 0, y: 0,
          col: [150, 200, 255],
          size: 5,
          phase: i
        });
      }
      
      // Tail
      for (let i = 0; i < 12; i++) {
        particles.push({
          baseX: cx - 80 - i * 8,
          baseY: cy + 45 + sin(i * 0.7) * 10,
          x: 0, y: 0,
          col: [120, 200, 180],
          size: 6 - i * 0.3,
          phase: i
        });
      }
      
      // Horns
      for (let i = 0; i < 5; i++) {
        particles.push({
          baseX: cx - 20 - i * 3,
          baseY: cy - 65 - i * 3,
          x: 0, y: 0,
          col: [180, 140, 220],
          size: 5,
          phase: i
        });
        particles.push({
          baseX: cx + 20 + i * 3,
          baseY: cy - 65 - i * 3,
          x: 0, y: 0,
          col: [180, 140, 220],
          size: 5,
          phase: i
        });
      }
      
      // Feet
      particles.push({baseX: cx - 35, baseY: cy + 65, x: 0, y: 0, col: [100], size: 7, phase: 0});
      particles.push({baseX: cx + 35, baseY: cy + 65, x: 0, y: 0, col: [100], size: 7, phase: 0});
      
      // Initialize positions
      for (let p of particles) {
        p.x = p.baseX;
        p.y = p.baseY;
      }
    }
    
    function draw() {
      background(26, 10, 46, 50);
      
      t += 0.03;
      const bounce = sin(t * 2) * 15;
      
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        
        // Subtle ripple (stay close to base)
        const offsetX = sin(t * 2 + p.phase * 0.5) * 3;
        const offsetY = cos(t * 1.5 + p.phase * 0.3) * 3;
        
        const targetX = p.baseX + offsetX;
        const targetY = p.baseY + offsetY + bounce;
        
        // Small movement
        p.x = lerp(p.x, targetX, 0.15);
        p.y = lerp(p.y, targetY, 0.15);
        
        // Pulse size
        const size = p.size * (0.8 + 0.4 * sin(t * 3 + p.phase));
        
        // Draw glow
        fill(p.col[0], p.col[1] || p.col[0], p.col[2] || p.col[0], 150);
        ellipse(p.x, p.y, size + 2, size + 2);
        
        // Draw point
        fill(p.col[0], p.col[1] || p.col[0], p.col[2] || p.col[0], 255);
        ellipse(p.x, p.y, size, size);
      }
      
      // Connect nearby points (outline effect)
      stroke(150, 220, 180, 30);
      strokeWeight(1);
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const d = dist(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
          if (d < 25) {
            stroke(
              (particles[i].col[0] + particles[j].col[0]) / 2,
              (particles[i].col[1] || particles[i].col[0] + particles[j].col[1] || particles[j].col[0]) / 2,
              (particles[i].col[2] || particles[i].col[0] + particles[j].col[2] || particles[j].col[0]) / 2,
              200 / d
            );
            line(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
          }
        }
      }
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
