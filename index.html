<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪼 Trilobite Jellyfish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030810; min-height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script>
    let particles = [];
    let t = 0;
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      const cx = width / 2;
      const cy = height / 2;
      const sc = min(width, height) / 500;
      
      // BELL (jellyfish top - dome shape)
      for (let i = 0; i < 50; i++) {
        const a = random(TWO_PI);
        const r = random(50, 90);
        const bellX = cx + r * cos(a) * 0.8;
        const bellY = cy - 40 * sc + r * sin(a) * 0.5;
        
        particles.push({
          baseX: bellX, baseY: bellY,
          x: 0, y: 0,
          col: [100, 180, 255],
          size: 5,
          phase: random(TWO_PI)
        });
      }
      
      // BELL RIM (around edge)
      for (let i = 0; i < 25; i++) {
        const a = (i / 25) * TWO_PI;
        const r = 85;
        particles.push({
          baseX: cx + r * cos(a) * 0.9,
          baseY: cy - 40 * sc + r * sin(a) * 0.5,
          x: 0, y: 0,
          col: [150, 220, 255],
          size: 5,
          phase: i * 0.3
        });
      }
      
      // TRILOBITE SEGMENTS (under the bell)
      for (let row = 0; row < 6; row++) {
        const rowY = cy + 20 * sc + row * 18 * sc;
        const rowWidth = 70 - row * 8;
        
        for (let i = 0; i < 12; i++) {
          const segX = cx - rowWidth + i * (rowWidth * 2 / 11);
          
          // Segments (like trilobite body segments)
          particles.push({
            baseX: segX, baseY: rowY,
            x: 0, y: 0,
            col: [80, 180, 200],
            size: 5,
            phase: row * 0.5 + i * 0.2
          });
          
          // Edge highlight
          if (i === 0 || i === 11) {
            particles.push({
              baseX: segX, baseY: rowY,
              x: 0, y: 0,
              col: [120, 220, 240],
              size: 4,
              phase: row + i
            });
          }
        }
      }
      
      // CENTRAL SPINE
      for (let i = -5; i <= 5; i++) {
        particles.push({
          baseX: cx, baseY: cy + 30 * sc + i * 15 * sc,
          x: 0, y: 0,
          col: [150, 230, 255],
          size: 5,
          phase: i
        });
      }
      
      // TENTACLES (flowing down - jellyfish arms)
      for (let arm = 0; arm < 12; arm++) {
        const baseAngle = (arm / 12) * TWO_PI;
        const startX = cx + cos(baseAngle) * 40;
        const startY = cy + 120 * sc;
        
        for (let i = 0; i < 20; i++) {
          const wave = sin(t * 2 + arm + i * 0.4) * 8;
          
          particles.push({
            baseX: startX + i * 3 * cos(baseAngle),
            baseY: startY + i * 12 + wave,
            x: 0, y: 0,
            col: [80, 180, 255],
            size: max(2, 5 - i * 0.15),
            phase: arm * 0.5 + i * 0.3
          });
        }
      }
      
      // INNER GLOW (when bell contracts)
      for (let i = 0; i < 20; i++) {
        const a = random(TWO_PI);
        const r = random(30);
        particles.push({
          baseX: cx + r * cos(a),
          baseY: cy - 20 * sc + r * sin(a) * 0.7,
          x: 0, y: 0,
          col: [200, 240, 255],
          size: 3,
          phase: random(TWO_PI)
        });
      }
      
      // Initialize
      for (let p of particles) {
        p.x = p.baseX;
        p.y = p.baseY;
      }
    }
    
    function draw() {
      background(3, 8, 16, 25);
      
      t += 0.025;
      const pulse = sin(t * 2) * 10;
      
      // Draw particles
      for (let p of particles) {
        // Pulse movement (contract/expand bell)
        let targetX = p.baseX;
        let targetY = p.baseY;
        
        if (p.baseY < height/2) {
          // Bell moves up/down
          targetY += pulse * 0.5;
        }
        
        // Tentacles wave more
        if (p.baseY > height/2 + 100) {
          targetY += sin(t * 3 + p.phase) * 5;
        }
        
        // Lerp to position
        p.x = p.x * 0.85 + targetX * 0.15;
        p.y = p.y * 0.85 + targetY * 0.15;
        
        // Size pulse
        const size = p.size * (0.8 + 0.3 * sin(t * 3 + p.phase));
        
        // Glow
        fill(p.col[0], p.col[1], p.col[2], 80);
        noStroke();
        ellipse(p.x, p.y, size + 2, size + 2);
        
        // Point
        fill(p.col[0], p.col[1], p.col[2], 220);
        ellipse(p.x, p.y, size, size);
      }
      
      // Ambient particles (ocean dust)
      for (let i = 0; i < 15; i++) {
        const px = (sin(t * 0.3 + i * 2) * 0.5 + 0.5) * width;
        const py = (cos(t * 0.2 + i * 3) * 0.5 + 0.5) * height;
        fill(100, 200, 255, 50);
        ellipse(px, py, 2, 2);
      }
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
