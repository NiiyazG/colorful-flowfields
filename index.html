<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐉 Cute Dragon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #1a0a2e, #2d1b4e);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Comic Sans MS', cursive;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script>
    let t = 0;
    let dragonX, dragonY;
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      dragonX = width / 2;
      dragonY = height / 2;
    }
    
    function draw() {
      // Soft background glow
      background(26, 10, 46);
      
      // Ambient particles
      for (let i = 0; i < 20; i++) {
        const px = (sin(t * 0.5 + i * 2.1) * 0.4 + 0.5) * width;
        const py = (cos(t * 0.3 + i * 1.7) * 0.4 + 0.5) * height;
        fill(150, 100, 200, 50 + 30 * sin(t + i));
        noStroke();
        ellipse(px, py, 3 + sin(t + i) * 2, 3 + sin(t + i) * 2);
      }
      
      t += 0.03;
      
      // Bounce animation
      const bounce = sin(t * 2) * 15;
      const breathe = sin(t) * 5;
      
      push();
      translate(dragonX, dragonY + bounce);
      
      // Tail
      noStroke();
      fill(120, 200, 180, 200);
      for (let i = 0; i < 8; i++) {
        const ty = 60 + i * 12;
        const tx = sin(t * 2 + i * 0.5) * 15;
        ellipse(-30 + tx, ty, 20 - i, 15 - i);
      }
      
      // Body
      fill(100, 220, 180);
      ellipse(0, 20, 90 + breathe, 80 + breathe);
      
      // Belly (lighter)
      fill(180, 255, 220, 180);
      ellipse(0, 25, 50, 45);
      
      // Wings (cute small)
      fill(150, 220, 255, 180);
      // Left wing
      push();
      translate(-35, -10);
      rotate(sin(t * 2) * 0.2 - 0.3);
      ellipse(0, 0, 40, 25);
      pop();
      // Right wing
      push();
      translate(35, -10);
      rotate(-sin(t * 2) * 0.2 + 0.3);
      ellipse(0, 0, 40, 25);
      pop();
      
      // Head
      fill(100, 220, 180);
      ellipse(0, -35, 70, 65);
      
      // Snout (cute round)
      fill(120, 230, 190);
      ellipse(0, -15, 30, 25);
      
      // Nostrils
      fill(80, 180, 140);
      ellipse(-6, -12, 4, 3);
      ellipse(6, -12, 4, 3);
      
      // Eyes (BIG and cute)
      fill(255);
      ellipse(-15, -35, 20, 22);
      ellipse(15, -35, 20, 22);
      
      // Pupils
      fill(30, 30, 60);
      ellipse(-15 + sin(t * 0.5) * 2, -35, 10, 12);
      ellipse(15 + sin(t * 0.5) * 2, -35, 10, 12);
      
      // Eye shine
      fill(255);
      ellipse(-17, -38, 5, 5);
      ellipse(13, -38, 5, 5);
      
      // Blush
      fill(255, 150, 150, 150);
      ellipse(-28, -25, 12, 8);
      ellipse(28, -25, 12, 8);
      
      // Horns
      fill(180, 140, 220);
      // Left horn
      push();
      translate(-20, -65);
      rotate(-0.4);
      ellipse(0, 0, 15, 25);
      pop();
      // Right horn
      push();
      translate(20, -65);
      rotate(0.4);
      ellipse(0, 0, 15, 25);
      pop();
      
      // Spikes on back
      fill(150, 180, 220);
      for (let i = 0; i < 5; i++) {
        const sx = sin(t * 2 + i * 0.4) * 3;
        ellipse(-30 + i * 15 + sx, -25, 10, 8);
      }
      
      // Feet
      fill(100, 200, 170);
      ellipse(-25, 65, 25, 20);
      ellipse(25, 65, 25, 20);
      
      // Toe beans (super cute)
      fill(180, 230, 200);
      for (let i = -1; i <= 1; i++) {
        ellipse(-25 + i * 6, 72, 6, 4);
        ellipse(25 + i * 6, 72, 6, 4);
      }
      
      pop();
      
      // Sparkles around
      for (let i = 0; i < 6; i++) {
        const angle = t + i * 1.2;
        const dist = 100 + sin(t * 2 + i) * 20;
        const sx = dragonX + cos(angle) * dist;
        const sy = dragonY + sin(angle) * dist + bounce;
        fill(255, 255, 200, 150);
        ellipse(sx, sy, 4, 4);
      }
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      dragonX = width / 2;
      dragonY = height / 2;
    }
  </script>
</body>
</html>
