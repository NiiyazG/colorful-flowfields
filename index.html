<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐉 Dragon Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050510; min-height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script>
    let particles = [];
    let t = 0;
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      const cx = width / 2;
      const cy = height / 2;
      const sc = min(width, height) / 600;
      
      // Dragon HEAD
      for (let i = 0; i < 30; i++) {
        const a = random(TWO_PI);
        const r = random(35);
        particles.push({
          baseX: cx + 180 * sc + r * cos(a) * 0.3,
          baseY: cy - 20 * sc + r * sin(a) * 0.4,
          x: 0, y: 0,
          col: [0, 200, 180],
          size: 6,
          phase: random(TWO_PI)
        });
      }
      
      // Dragon EYES
      particles.push({baseX: cx + 165 * sc, baseY: cy - 30 * sc, x: 0, y: 0, col: [255, 255, 100], size: 8, phase: 0});
      particles.push({baseX: cx + 195 * sc, baseY: cy - 30 * sc, x: 0, y: 0, col: [255, 255, 100], size: 8, phase: 0});
      particles.push({baseX: cx + 165 * sc, baseY: cy - 30 * sc, x: 0, y: 0, col: [0], size: 4, phase: 1});
      particles.push({baseX: cx + 195 * sc, baseY: cy - 30 * sc, x: 0, y: 0, col: [0], size: 4, phase: 1});
      
      // SNOUT
      for (let i = 0; i < 15; i++) {
        particles.push({
          baseX: cx + 210 * sc + i * 3,
          baseY: cy - 18 * sc + sin(i) * 3,
          x: 0, y: 0,
          col: [0, 180, 160],
          size: 5,
          phase: i
        });
      }
      
      // NECK (long curved body)
      for (let i = 0; i < 25; i++) {
        const progress = i / 24;
        const bx = cx + (160 - i * 6) * sc;
        const by = cy + (sin(progress * PI) * 40 - progress * 30) * sc;
        
        // Body line
        particles.push({
          baseX: bx, baseY: by,
          x: 0, y: 0,
          col: [0, 200, 180],
          size: 7,
          phase: i
        });
        // Belly
        particles.push({
          baseX: bx, baseY: by + 12 * sc,
          x: 0, y: 0,
          col: [0, 230, 200],
          size: 5,
          phase: i + 10
        });
      }
      
      // BODY
      for (let i = 0; i < 35; i++) {
        const bx = cx - 20 * sc + (i % 7) * 25 * sc;
        const by = cy + 60 * sc + floor(i / 7) * 20 * sc;
        
        particles.push({
          baseX: bx, baseY: by,
          x: 0, y: 0,
          col: [0, 200, 180],
          size: 6,
          phase: i
        });
        particles.push({
          baseX: bx, baseY: by + 10 * sc,
          x: 0, y: 0,
          col: [0, 220, 190],
          size: 5,
          phase: i + 20
        });
      }
      
      // WINGS (on back)
      for (let i = 0; i < 20; i++) {
        // Left wing
        particles.push({
          baseX: cx - 30 * sc - i * 8,
          baseY: cy + 40 * sc - i * 3,
          x: 0, y: 0,
          col: [100, 180, 255],
          size: 5 - i * 0.15,
          phase: i
        });
        // Right wing
        particles.push({
          baseX: cx + 30 * sc + i * 8,
          baseY: cy + 40 * sc - i * 3,
          x: 0, y: 0,
          col: [100, 180, 255],
          size: 5 - i * 0.15,
          phase: i + 30
        });
      }
      
      // TAIL (curved)
      for (let i = 0; i < 20; i++) {
        const tx = cx - 50 * sc - i * 15;
        const ty = cy + 120 * sc + i * 8 + sin(i * 0.5) * 10;
        
        particles.push({
          baseX: tx, baseY: ty,
          x: 0, y: 0,
          col: [0, 180, 160],
          size: 5 - i * 0.15,
          phase: i
        });
      }
      
      // HORNS
      for (let i = 0; i < 6; i++) {
        particles.push({
          baseX: cx + 170 * sc - i * 5,
          baseY: cy - 55 * sc - i * 5,
          x: 0, y: 0,
          col: [180, 100, 200],
          size: 4,
          phase: i
        });
        particles.push({
          baseX: cx + 190 * sc + i * 5,
          baseY: cy - 55 * sc - i * 5,
          x: 0, y: 0,
          col: [180, 100, 200],
          size: 4,
          phase: i + 10
        });
      }
      
      // LEGS (4 legs)
      const legPositions = [
        [cx - 20, cy + 80], [cx + 30, cy + 80],
        [cx - 20, cy + 120], [cx + 30, cy + 120]
      ];
      for (let lp of legPositions) {
        for (let j = 0; j < 5; j++) {
          particles.push({
            baseX: lp[0] * sc + j * 6 * (lp[0] > cx ? 1 : -1),
            baseY: lp[1] * sc + j * 8,
            x: 0, y: 0,
            col: [0, 180, 160],
            size: 4,
            phase: j
          });
        }
      }
      
      // Initialize
      for (let p of particles) {
        p.x = p.baseX;
        p.y = p.baseY;
      }
    }
    
    function draw() {
      background(5, 5, 16, 30);
      
      t += 0.03;
      const breathe = sin(t) * 5;
      
      for (let p of particles) {
        // Stay near base position
        const wobbleX = sin(t * 2 + p.phase) * 3;
        const wobbleY = cos(t * 1.5 + p.phase) * 3;
        
        const targetX = p.baseX + wobbleX;
        const targetY = p.baseY + wobbleY + breathe;
        
        // Small lerp for subtle movement
        p.x = p.x * 0.9 + targetX * 0.1;
        p.y = p.y * 0.9 + targetY * 0.1;
        
        // Draw glow
        fill(p.col[0], p.col[1], p.col[2], 100);
        noStroke();
        ellipse(p.x, p.y, p.size + 2, p.size + 2);
        
        // Draw point
        fill(p.col[0], p.col[1], p.col[2], 220);
        ellipse(p.x, p.y, p.size, p.size);
      }
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
