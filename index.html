<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪼 Living Jellyfish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020508; min-height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script>
    let tentacles = [];
    let t = 0;
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      const cx = width / 2;
      const cy = height / 2;
      
      // BELL particles (dome)
      for (let ring = 0; ring < 4; ring++) {
        const ringR = 30 + ring * 20;
        const ringY = cy - 20 - ring * 10;
        
        for (let i = 0; i < 20; i++) {
          const a = (i / 20) * TWO_PI + ring * 0.3;
          const wiggle = sin(a * 3) * 5;
          
          tentacles.push({
            cx: cx + (ringR + wiggle) * cos(a),
            cy: ringY + ringR * sin(a) * 0.4,
            x: 0, y: 0,
            vx: random(-0.5, 0.5),
            vy: random(-0.5, 0.5),
            targetX: 0, targetY: 0,
            size: 6 - ring * 0.8,
            col: [100 + ring * 30, 180 + ring * 20, 255],
            phase: a,
            isBell: true,
            ring: ring
          });
        }
      }
      
      // RIM (edge of bell)
      for (let i = 0; i < 30; i++) {
        const a = (i / 30) * TWO_PI;
        const r = 105 + sin(a * 4) * 3;
        
        tentacles.push({
          cx: cx + r * cos(a) * 0.95,
          cy: cy - 15 + r * sin(a) * 0.4,
          x: 0, y: 0,
          vx: 0, vy: 0,
          targetX: 0, targetY: 0,
          size: 5,
          col: [180, 230, 255],
          phase: a * 2,
          isBell: true,
          ring: -1
        });
      }
      
      // UNDERBODY segments (trilobite style)
      for (let row = 0; row < 5; row++) {
        const rowY = cy + 50 + row * 14;
        const rowSize = 50 - row * 6;
        
        for (let i = 0; i < 12; i++) {
          const segX = cx - rowSize + i * (rowSize * 2 / 11);
          
          tentacles.push({
            cx: segX, cy: rowY,
            x: 0, y: 0,
            vx: random(-0.3, 0.3), vy: random(-0.3, 0.3),
            targetX: 0, targetY: 0,
            size: 4,
            col: [80, 170, 200],
            phase: row + i,
            isBell: false,
            row: row
          });
        }
      }
      
      // TENTACLES (flowing down)
      for (let arm = 0; arm < 16; arm++) {
        const baseAngle = (arm / 16) * TWO_PI;
        const armStartX = cx + cos(baseAngle) * 35;
        const armStartY = cy + 90;
        
        for (let seg = 0; seg < 25; seg++) {
          const droop = seg * seg * 0.4;
          
          tentacles.push({
            cx: armStartX + seg * 2.5 * cos(baseAngle),
            cy: armStartY + droop,
            x: 0, y: 0,
            vx: random(-0.2, 0.2), vy: random(0, 0.3),
            targetX: 0, targetY: 0,
            size: max(1.5, 5 - seg * 0.12),
            col: [80, 160 + seg * 2, 200 + seg * 2],
            phase: arm + seg * 0.5,
            isBell: false,
            isTentacle: true,
            arm: arm,
            seg: seg
          });
        }
      }
      
      // Initialize positions
      for (let p of tentacles) {
        p.x = p.cx;
        p.y = p.cy;
      }
    }
    
    function draw() {
      background(2, 5, 8, 15);
      
      t += 0.03;
      const pulse = sin(t);
      const pulseY = pulse * 8;
      
      // Update each tentacle
      for (let i = 0; i < tentacles.length; i++) {
        const p = tentacles[i];
        
        // Calculate target position
        let targetX = p.cx;
        let targetY = p.cy + pulseY;
        
        // Bell rings expand/contract
        if (p.isBell && p.ring >= 0) {
          const expand = (p.ring + 1) * pulse * 1.5;
          targetX += expand * cos(p.phase);
          targetY += expand * sin(p.phase) * 0.5;
        }
        
        // Tentacles wave more naturally
        if (p.isTentacle) {
          const wave = sin(t * 2.5 + p.phase) * (3 + p.seg * 0.15);
          targetX += wave;
          targetY += cos(t * 2 + p.phase) * (1 + p.seg * 0.05);
        }
        
        // Physics-like movement (spring to target)
        const dx = targetX - p.x;
        const dy = targetY - p.y;
        
        p.vx += dx * 0.08;
        p.vy += dy * 0.08;
        p.vx *= 0.85;
        p.vy *= 0.85;
        
        p.x += p.vx;
        p.y += p.vy;
        
        // Glow
        fill(p.col[0], p.col[1], p.col[2], 60);
        noStroke();
        ellipse(p.x, p.y, p.size + 2.5, p.size + 2.5);
        
        // Main point
        fill(p.col[0], p.col[1], p.col[2], 230);
        ellipse(p.x, p.y, p.size, p.size);
        
        // Bright center
        fill(220, 245, 255, 180);
        ellipse(p.x, p.y, p.size * 0.5, p.size * 0.5);
      }
      
      // Floating particles (ocean plankton)
      for (let i = 0; i < 30; i++) {
        const floatX = (sin(t * 0.5 + i * 1.7) * 0.5 + 0.5) * width;
        const floatY = (cos(t * 0.3 + i * 2.1) * 0.5 + 0.5) * height;
        const floatSize = 1 + sin(t + i) * 0.8;
        
        fill(100, 200, 255, 40 + i);
        ellipse(floatX, floatY, floatSize, floatSize);
      }
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
