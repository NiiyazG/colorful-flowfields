<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trilobite Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; min-height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script>
    let particles = [];
    let t = 0;
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      const cx = width / 2;
      const cy = height / 2;
      const scale = min(width, height) / 500;
      
      // Original trilobite formula from the source
      for (let i = 0; i < 300; i++) {
        const x = (i % 200) / 8 - 12.5;
        const y = Math.floor(i / 200) / 8 - 12;
        
        // Keep points in trilobite body area
        const inBody = (x > -8 && x < 8 && y > -8 && y < 8);
        
        if (inBody) {
          particles.push({
            baseX: cx + x * scale * 1.2,
            baseY: cy + y * scale * 1.2,
            x: 0, y: 0,
            col: [180 + random(-30, 30), 220 + random(-20, 30), 200 + random(-20, 30)],
            size: random(3, 5),
            phase: random(Math.PI * 2)
          });
        }
      }
      
      // Center line (spine)
      for (let i = -7; i <= 7; i++) {
        particles.push({
          baseX: cx + i * scale * 1.2,
          baseY: cy,
          x: 0, y: 0,
          col: [255, 255, 200],
          size: 5,
          phase: 0
        });
      }
      
      // Segments
      for (let seg = -6; seg <= 6; seg++) {
        if (seg !== 0) {
          const segX = cx + seg * scale * 1.2;
          for (let ry = -4; ry <= 4; ry++) {
            particles.push({
              baseX: segX,
              baseY: cy + ry * scale * 1.2,
              x: 0, y: 0,
              col: [150, 200, 180],
              size: 4,
              phase: seg
            });
          }
        }
      }
      
      // Initialize
      for (let p of particles) {
        p.x = p.baseX;
        p.y = p.baseY;
      }
    }
    
    function draw() {
      background(5, 5, 8, 25);
      
      t += Math.PI / 90;
      
      for (let p of particles) {
        // Original trilobite math
        const dx = (p.baseX - width/2) / 1.2 * 8 + 12.5;
        const dy = (p.baseY - height/2) / 1.2 * 8 + 12;
        
        const k = dx / 8 - 12.5;
        const e = dy / 8 - 12;
        const o = 2 - Math.hypot(k, e) / 3;
        const d = -5 * Math.abs(Math.sin(k/2) * Math.cos(e * 0.6));
        
        // Apply flow with small amplitude (stay near base)
        const offsetX = (e * Math.cos(t) + d * k * Math.sin(d + t)) * 0.7 + k * o + 130 - 130;
        const offsetY = (-d * o * 9 + dy * e / 19 + d * e * Math.cos(d + t)) * 0.7 + e * o + 150 - 150;
        
        const targetX = p.baseX + offsetX * 0.15;
        const targetY = p.baseY + offsetY * 0.15;
        
        p.x = p.x * 0.85 + targetX * 0.15;
        p.y = p.y * 0.85 + targetY * 0.15;
        
        // Draw
        const phase = Math.sin(t * 2 + p.phase);
        fill(p.col[0], p.col[1], p.col[2], 200);
        noStroke();
        
        const size = p.size * (0.8 + 0.3 * phase);
        ellipse(p.x, p.y, size, size);
        
        // Glow
        fill(p.col[0], p.col[1], p.col[2], 80);
        ellipse(p.x, p.y, size + 3, size + 3);
      }
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
