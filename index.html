<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Field Art</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    h1 {
      color: #ff6b9d;
      font-size: 1.8rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px #ff6b9d, 0 0 40px #ff6b9d55;
      letter-spacing: 0.3em;
    }
    canvas {
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(255,107,157,0.3), inset 0 0 60px rgba(0,0,0,0.5);
    }
    .controls { margin-top: 1rem; display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    button {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #00fff5;
      border: 1px solid #00fff555;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s;
    }
    button:hover {
      background: linear-gradient(135deg, #ff6b9d, #c44569);
      color: #fff;
      box-shadow: 0 0 20px #ff6b9d88;
    }
  </style>
</head>
<body>
  <h1>✨ FLOW FIELD ✨</h1>
  <canvas></canvas>
  <div class="controls">
    <button onclick="reset()">🔄 Reset</button>
    <button onclick="toggle()">⏸ Pause</button>
  </div>
  <script>
    const canvas = document.querySelector('canvas');
    const ctx = canvas.getContext('2d');
    const w = 600, h = 600;
    canvas.width = w; canvas.height = h;
    let t = 0, running = true;
    const colors = ['#ff6b9d','#c44569','#ffd93d','#6bcb77','#4d96ff','#00fff5','#ff9f43'];
    const a = (x, y, o = 2 - Math.abs(Math.sin(k = x / 10 - 15)) * Math.cos(e = y / 10 - 12) * 1.2) => {
      const d = -4 * Math.abs(Math.sin(k / 2) * Math.cos(e * 0.5));
      return [
        (x + e * Math.cos(t) + d * k * Math.sin(d + t)) * 0.6 + k * o + w / 2,
        (y - d * o * 8 + y * e / 18 + d * e * Math.cos(d + t)) * 0.6 + e * o + h / 2
      ];
    };
    function draw() {
      if (!running) return;
      ctx.fillStyle = 'rgba(10,10,15,0.03)';
      ctx.fillRect(0, 0, w, h);
      t += Math.PI / 90;
      for (let i = 3500; i--;) {
        const x = i % w, y = i / w * 20;
        const [nx, ny] = a(x, y);
        if (nx > 0 && nx < w && ny > 0 && ny < h) {
          ctx.beginPath();
          ctx.strokeStyle = colors[Math.floor(i / 500) % colors.length];
          ctx.lineWidth = 0.8;
          ctx.globalAlpha = 0.7;
          ctx.moveTo(x, y);
          ctx.lineTo(nx, ny);
          ctx.stroke();
        }
      }
      requestAnimationFrame(draw);
    }
    function reset() { ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0, 0, w, h); t = 0; }
    function toggle() { running = !running; if (running) draw(); }
    reset(); draw();
  </script>
</body>
</html>
