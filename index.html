<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bird Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script>
    let t = 0;
    
    // Bird silhouette points (normalized 0-1)
    const bird = [
      // Body
      [0.5, 0.3], [0.52, 0.32], [0.55, 0.35], [0.58, 0.4], [0.6, 0.45],
      [0.62, 0.5], [0.63, 0.55], [0.62, 0.6], [0.6, 0.65], [0.55, 0.68],
      [0.5, 0.7], [0.45, 0.68], [0.4, 0.65], [0.38, 0.6], [0.37, 0.55],
      [0.38, 0.5], [0.4, 0.45], [0.42, 0.4], [0.45, 0.35], [0.48, 0.32],
      // Head
      [0.6, 0.42], [0.65, 0.38], [0.7, 0.36], [0.75, 0.38], [0.78, 0.42],
      // Beak
      [0.82, 0.44], [0.85, 0.46], [0.82, 0.48],
      // Wing top
      [0.35, 0.35], [0.28, 0.3], [0.2, 0.22], [0.15, 0.18], [0.18, 0.25],
      [0.22, 0.32], [0.28, 0.38],
      // Wing bottom
      [0.35, 0.55], [0.28, 0.6], [0.22, 0.65], [0.18, 0.7], [0.22, 0.72],
      [0.28, 0.7], [0.35, 0.65],
      // Tail
      [0.35, 0.65], [0.3, 0.68], [0.25, 0.7], [0.22, 0.72]
    ];
    
    // Colors
    const colors = [
      [255,200,100],  // gold
      [255,140,50],   // orange
      [255,100,80],   // rose
      [100,220,255],  // sky
      [80,180,255],   // blue
      [180,100,255]   // purple
    ];
    
    let particles = [];
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      // Spawn particles around bird shape
      for (let i = 600; i--;) {
        const pt = random(bird);
        particles.push({
          x: pt[0] * width + random(-30, 30),
          y: pt[1] * height + random(-30, 30),
          vx: random(-1, 1),
          vy: random(-1, 1),
          size: random(2, 6),
          col: random(colors),
          phase: random(TWO_PI)
        });
      }
    }
    
    function draw() {
      // Fade trails
      noStroke();
      fill(15,12,41, 30);
      rect(0, 0, width, height);
      
      t += 0.02;
      
      // Draw bird shape
      fill(255,255,255, 8);
      beginShape();
      for (let pt of bird) {
        vertex(pt[0] * width, pt[1] * height);
      }
      endShape(CLOSE);
      
      // Update and draw particles
      for (let p of particles) {
        // Flow field attraction to bird
        let bx = 0, by = 0, minDist = Infinity;
        for (let pt of bird) {
          const dx = pt[0] * width - p.x;
          const dy = pt[1] * height - p.y;
          const d = dx*dx + dy*dy;
          if (d < minDist) {
            minDist = d;
            bx = dx;
            by = dy;
          }
        }
        
        // Orbit around bird shape
        const angle = atan2(by, bx);
        const field = sin(angle * 3 + t) * 2;
        
        p.vx += cos(angle + field) * 0.3 + noise(p.x * 0.01, t) - 0.5;
        p.vy += sin(angle + field) * 0.3 + noise(p.y * 0.01, t + 100) - 0.5;
        
        p.vx *= 0.96;
        p.vy *= 0.96;
        
        p.x += p.vx;
        p.y += p.vy;
        
        // Wrap around
        if (p.x < 0) p.x = width;
        if (p.x > width) p.x = 0;
        if (p.y < 0) p.y = height;
        if (p.y > height) p.y = 0;
        
        // Draw particle with glow
        const glow = 0.5 + 0.5 * sin(t * 3 + p.phase);
        fill(p.col[0], p.col[1], p.col[2], 200 * glow);
        noStroke();
        ellipse(p.x, p.y, p.size * glow, p.size * glow);
      }
      
      // Add sparkle
      if (random() > 0.95) {
        const pt = random(bird);
        fill(255,255,255, random(100, 255));
        ellipse(pt[0] * width + random(-20, 20), pt[1] * height + random(-20, 20), random(1, 3));
      }
    }
  </script>
</body>
</html>
